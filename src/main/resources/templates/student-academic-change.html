<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Academic Change</title>
    <link rel="icon" type="image/png"  href="/favicon.png">
    <link rel="stylesheet" href="/css/basic.css">
    <link rel="stylesheet" href="/css/properties.css">
    <link rel="stylesheet" href="/css/change-academic.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="profile" id="profile">
                <h3 id="adminname">&nbsp;</h3>
                <p id="admincollegeName">&nbsp;</p>
            </div>
            <hr class="line">
            <nav>
                <ul>
                    <li id="dashboard">Dashboard</li>
                    <li id="addUser">Add User</li>
                    <li id="searchUser">Search User</li>
                    <li id="userUpdate">Update User</li>
                    <li id="allStudent">All Students</li>
                    <li id="allTeacher">All Teachers</li>
                    <li id="imageChangeReq">Image Requests</li>
                    <li id="changeAcademic" class="active">Change Academic</li>
                    <li id="academic">Academic</li>
                    <li id="allAttendance">Session History</li>
                    <li id="recycleBin">Recycle Bin</li>
                </ul>
            </nav>

            <button class="logout" id="logout">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="main">

            <div class="page-header">

                <div class="header-left">
                    <h2>Change Academic</h2>
                    <p class="subtitle">Manage and review Student Academic</p>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" class="search-icon">
                            <path d="M21 21l-4.35-4.35m1.6-5.4a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor"
                                stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search by Enrollment No...">
                    </div>
                    <button class="refresh-btn" onclick="loadImageRequest()">
                        ↻ Refresh
                    </button>
                </div>


            </div>

            <!-- Cards Container -->
            <div class="cards-container" id="cardsContainer">
                <div class="left">
                        <div class="academic-dit-div">
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="yearInput" required readonly />
                                    <label for="yearInput">year</label>
                                    <ul id="yearOption" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="branchInput" required readonly />
                                    <label for="branchInput">branch</label>
                                    <ul id="branchOption" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="semInput" required readonly />
                                    <label for="semInput">semester</label>
                                    <ul id="semOption" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="classInput" required readonly />
                                    <label for="classInput">class</label>
                                    <ul id="classOption" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="batchInput" required readonly />
                                    <label for="batchInput">batch</label>
                                    <ul id="batchOption" class="options"></ul>
                                </div>
                            </div>
                        </div>

                        <div id="leftStudentResult"></div>

                </div>
                <div class="right">
                    
                        <div class="academic-dit-div">
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="yearInput2" required readonly />
                                    <label for="yearInput">year</label>
                                    <ul id="yearOption2" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="branchInput2" required readonly />
                                    <label for="branchInput">branch</label>
                                    <ul id="branchOption2" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="semInput2" required readonly />
                                    <label for="semInput">semester</label>
                                    <ul id="semOption2" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="classInput2" required readonly />
                                    <label for="classInput">class</label>
                                    <ul id="classOption2" class="options"></ul>
                                </div>
                            </div>
                            <div class="field">
                                <div class="custom-dropdown">
                                    <input type="text" id="batchInput2" required readonly />
                                    <label for="batchInput">batch</label>
                                    <ul id="batchOption2" class="options"></ul>
                                </div>
                            </div>
                        </div>
                        <div id="rightStudentResult"></div>

                
                </div>
            </div>




        </main>

    </div>
   <div id="loader-root"></div>
    <div id="confirm-root"></div>
    <script src="/js/basic.js"></script>
    <script src="/js/change-academic.js"></script>
</body>

</html>
