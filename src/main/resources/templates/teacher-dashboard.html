<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Smart Attendance System</title>
    <link rel="icon" type="image/png"  href="/favicon.png">
    <link rel="stylesheet" href="/css/basic.css">
    <link rel="stylesheet" href="/css/properties.css">
    <link rel="stylesheet" href="/css/snackbar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --dark: #1B263B;
            --midDark: #354a75;
            --light: #ffffff;
            --bg: #f5f6fa;
            --grey: #e8eaf0;
            --success: #16a34a;
            --warning: #d97706;
            --error: #dc2626;

            --ink: #1a1f2e;
            --ink-soft: #4a5568;
            --ink-muted: #8896aa;
            --surface: #ffffff;
            --surface-2: #f7f8fc;
            --border: #e8eaef;
            --border-soft: #f0f1f6;

            --shadow-sm: 0 1px 3px rgba(26, 31, 46, 0.06), 0 1px 8px rgba(26, 31, 46, 0.04);
            --shadow-md: 0 4px 16px rgba(26, 31, 46, 0.08), 0 1px 4px rgba(26, 31, 46, 0.05);
            --radius: 14px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 32px 36px;
            background: var(--bg);
            min-width: 0;
        }

        .main::-webkit-scrollbar { width: 4px; }
        .main::-webkit-scrollbar-thumb { background: #d0d5e0; border-radius: 4px; }

        /* ── Header ── */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dash-header-left {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Brand */
        .app-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(27, 38, 59, 0.18);
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .app-logo-mark { width: 36px; height: 36px; flex-shrink: 0; }

        .app-name { display: flex; flex-direction: column; gap: 2px; }

        .app-name-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.2px;
            line-height: 1;
        }

        .app-name-title em { font-style: normal; color: var(--midDark); }

        .app-name-sub {
            font-size: 10px;
            color: var(--ink-muted);
            font-weight: 400;
        }

        .dash-header-left h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.8px;
            line-height: 1;
        }

        /* Date chip */
        .dash-date {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            color: var(--ink-soft);
            font-weight: 500;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            margin-top: 6px;
        }

        /* ── Stat Cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 18px 16px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--dark);
            box-shadow: var(--shadow-sm);
            position: relative;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.35s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.10s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            margin-bottom: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            overflow: hidden;
        }

        .stat-icon img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            display: block;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--ink);
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 12px;
            color: var(--ink-muted);
            font-weight: 500;
        }

        .stat-badge {
            position: absolute;
            top: 15px;
            right: 16px;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .stat-badge.up   { background: #e8f8ee; color: #15803d; }
        .stat-badge.down { background: #fce8e8; color: #b91c1c; }
        .stat-badge.info { background: #eaecf5; color: var(--midDark); }

        /* ── Section Card ── */
        .section-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: visible;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.35s ease forwards;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-soft);
            flex-wrap: nowrap;
            gap: 12px;
        }

        .section-head h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.2px;
        }

        .details-link {
            font-size: 11.5px;
            color: var(--midDark);
            font-weight: 600;
            padding: 5px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.14s;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .details-link:hover { background: var(--border); }

        /* ── Chart Wrap ── */
        .chart-wrap {
            padding: 20px 20px 24px;
            overflow: hidden;
            border-radius: 0 0 var(--radius) var(--radius);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .chart-subtitle {
            font-size: 11px;
            color: var(--ink-muted);
            font-weight: 500;
        }

        .chart-legend {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--ink-soft);
            font-weight: 500;
        }

        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        .legend-swatch.good { background: var(--ink); }
        .legend-swatch.low  { background: #e05c5c; }

        /* ── Bar Chart ── */
        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            flex: 1;
            min-height: 150px;
            overflow-x: auto;
            overflow-y: visible;
            padding-bottom: 2px;
            flex-wrap: nowrap;
        }

        .chart-bars::-webkit-scrollbar { height: 3px; }
        .chart-bars::-webkit-scrollbar-thumb { background: #d0d5e0; border-radius: 3px; }

        .bar-col {
            flex: 0 0 52px;
            width: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar-pct {
            font-size: 10px;
            font-weight: 700;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
        }

        .bar {
            width: 100%;
            border-radius: 5px 5px 0 0;
            background: var(--ink);
            min-height: 3px;
            position: relative;
            cursor: pointer;
            transition: opacity 0.14s;
        }

        .bar.low { background: #e05c5c; }
        .bar:hover { opacity: 0.72; }

        /* Tooltip */
        .bar-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--ink);
            color: #fff;
            font-size: 10.5px;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 7px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.13s;
            z-index: 100;
            line-height: 1.5;
            box-shadow: 0 4px 12px rgba(26, 31, 46, 0.2);
        }

        .bar-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: var(--ink);
        }

        .bar:hover .bar-tooltip { opacity: 1; }

        .bar-label {
            font-size: 10px;
            color: var(--ink-muted);
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
        }

        .bar-date {
            font-size: 9px;
            color: #b0bac8;
        }

        .chart-empty,
        .chart-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 150px;
            gap: 8px;
            color: var(--ink-muted);
            font-size: 13px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ── Day Selector ── */
        .section-head-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .day-selector {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .day-btn {
            border: none;
            background: transparent;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-muted);
            padding: 4px 9px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.14s ease;
            font-family: 'Outfit', sans-serif;
        }

        .day-btn:hover { background: var(--border); color: var(--ink); }

        .day-btn.active {
            background: var(--ink);
            color: #fff;
            box-shadow: 0 1px 4px rgba(26, 31, 46, 0.2);
        }

        @keyframes spin   { to { transform: rotate(360deg); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* ── Responsive ── */
        @media (max-width: 900px)  { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 767px) {
            .main { padding: 14px 14px; padding-top: 60px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-value { font-size: 26px; }
            .dash-header-left h1 { font-size: 22px; }
            .dash-date { display: none; }
        }
        @media (max-width: 400px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="container">

        <aside class="sidebar">
            <div class="profile" id="profile">
                <h3 id="teachername">&nbsp;</h3>
                <p id="teachercollegeName">&nbsp;</p>
            </div>
            <hr class="line">
            <nav>
                <ul>
                    <li class="active" id="dashboard">Dashboard</li>
                    <li id="newsession">Create New Session</li>
                    <li id="allAttendance">Session History</li>
                    <li id="recycleBin">Recycle Bin</li>
                </ul>
            </nav>
            <button class="logout" id="logout">Logout</button>
        </aside>

        <main class="main">

            <!-- Header -->
            <div class="dash-header">
                <div class="dash-header-left">
                    <!-- Brand -->
                    <div class="app-brand">
                        <div class="app-logo">
                            <img src="/favicon.png" alt="Smart Attendance Logo"
                                onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg,#354a75,#1B263B)';">
                        </div>
                        <div class="app-name">
                            <div class="app-name-title"><em>Smart</em> Attendance</div>
                            <div class="app-name-sub">The future of classroom attendance.</div>
                        </div>
                    </div>
                    <h1>Dashboard</h1>
                </div>

                <div class="dash-date">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <rect x="0.75" y="2" width="11.5" height="10.25" rx="2" stroke="#4a5568" stroke-width="1.2" />
                        <path d="M4 1v2.5M9 1v2.5" stroke="#4a5568" stroke-width="1.2" stroke-linecap="round" />
                        <path d="M0.75 5.5h11.5" stroke="#4a5568" stroke-width="1.2" />
                    </svg>
                    <span id="currentDate"></span>
                </div>
            </div>

            <!-- Stat Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><img src="/assets/icons/attendance.png"></div>
                    <div class="stat-badge info">Total</div>
                    <div class="stat-value" id="totalSessions">—</div>
                    <div class="stat-label">Total Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><img src="/assets/icons/activities.png"></div>
                    <div class="stat-badge up">Live</div>
                    <div class="stat-value" id="activeSessions">—</div>
                    <div class="stat-label">Active Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><img src="/assets/icons/average.png"></div>
                    <div class="stat-badge info">Avg</div>
                    <div class="stat-value" id="avgAttendance">—</div>
                    <div class="stat-label">Avg Attendance %</div>
                </div>
            </div>

            <!-- Attendance Chart -->
            <div class="section-card" style="animation-delay:0.22s; margin-bottom:24px;">
                <div class="section-head">
                    <h3>Attendance Overview</h3>
                    <div class="section-head-right">
                        <div class="day-selector" id="daySelector">
                            <button class="day-btn" data-days="1">1D</button>
                            <button class="day-btn" data-days="3">3D</button>
                            <button class="day-btn active" data-days="5">5D</button>
                            <button class="day-btn" data-days="7">7D</button>
                            <button class="day-btn" data-days="10">10D</button>
                        </div>
                        <a class="details-link" onclick="document.getElementById('allAttendance').click()">Details →</a>
                    </div>
                </div>
                <div class="chart-wrap">
                    <div class="chart-meta">
                        <span class="chart-subtitle" id="chartSubtitle">Last 5 days — newest first</span>
                        <div class="chart-legend">
                            <div class="legend-item">
                                <div class="legend-swatch good"></div>
                                <span>≥ 70%</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-swatch low"></div>
                                <span>&lt; 70%</span>
                            </div>
                        </div>
                    </div>
                    <div class="chart-bars" id="attendanceChart">
                        <div class="chart-loading">
                            <div class="spinner"></div>
                            <span>Loading…</span>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="loader-root"></div>
    <div id="confirm-root"></div>
    <script src="/js/teacher-basic.js"></script>
    <script src="/js/snackbar.js"></script>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-IN', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        });

        // ── Animated counter ──────────────────────────────
        function animateCount(el, target) {
            if (isNaN(target)) { el.textContent = target; return; }
            let val = 0;
            const timer = setInterval(() => {
                val += Math.ceil((target - val) / 5);
                el.textContent = val;
                if (val >= target) { el.textContent = target; clearInterval(timer); }
            }, 16);
        }

        // ── Transform API sessions → chart bars ───────────
        // API: { date, subjectName, attendancePercentage, teacherName }
        function transformSessions(sessions) {
            if (!sessions || !sessions.length) return [];
            return sessions
                .map(s => ({
                    label:    s.subjectName,
                    fullDate: s.date || '',
                    date:     s.date ? s.date.slice(5) : '',
                    pct:      Math.round(s.attendancePercentage)
                }))
                .sort((a, b) => new Date(b.fullDate) - new Date(a.fullDate));
        }

        // ── Render bar chart ──────────────────────────────
        function renderChart(data) {
            const container = document.getElementById('attendanceChart');

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="chart-empty"><span style="font-size:24px">📭</span><span>No sessions found</span></div>`;
                return;
            }

            const maxPct = Math.max(...data.map(d => d.pct), 1);

            container.innerHTML = data.map(({ label, date, pct }) => {
                const h = Math.max(Math.round((pct / maxPct) * 130), 3);
                return `<div class="bar-col">
                    <div class="bar-pct">${pct}%</div>
                    <div class="bar ${pct < 70 ? 'low' : ''}" style="height:${h}px">
                        <div class="bar-tooltip">${label}<br>${pct}% · ${date}</div>
                    </div>
                    <div class="bar-label">${label}<div class="bar-date">${date}</div></div>
                </div>`;
            }).join('');
        }

        // ── Loading state ─────────────────────────────────
        function showChartLoading() {
            document.getElementById('attendanceChart').innerHTML =
                `<div class="chart-loading"><div class="spinner"></div><span>Loading…</span></div>`;
        }

        // ── Update subtitle ───────────────────────────────
        function updateSubtitle(days) {
            document.getElementById('chartSubtitle').textContent =
                `Last ${days} day${days > 1 ? 's' : ''} — newest first`;
        }

        // ── Fetch chart only (day change) ─────────────────
        async function loadChart(days) {
            showChartLoading();
            updateSubtitle(days);
            try {
                const res = await fetch(`/api/teacher/dashboard/${days}`);
                if (!res.ok) throw new Error();
                const { response: d } = await res.json();
                renderChart(transformSessions(d.sessions));
            } catch {
                renderChart([]);
            }
        }

        // ── Day selector ──────────────────────────────────
        let currentDays = 5;

        document.getElementById('daySelector').addEventListener('click', e => {
            const btn = e.target.closest('.day-btn');
            if (!btn) return;
            const days = parseInt(btn.dataset.days);
            if (days === currentDays) return;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDays = days;
            loadChart(days);
        });

        // ── Initial full load ─────────────────────────────
        // API fields: totalSession, activeSession, avgAttendance, sessions[]
        async function loadDashboard() {
            try {
                const res = await fetch(`/api/teacher/dashboard/${currentDays}`);
                if (!res.ok) throw new Error('Failed');
                const { response: d } = await res.json();

                animateCount(document.getElementById('totalSessions'),  d.totalSession  ?? '—');
                animateCount(document.getElementById('activeSessions'), d.activeSession ?? '—');
                animateCount(document.getElementById('avgAttendance'),
                    d.avgAttendance != null ? Math.round(d.avgAttendance) : '—');

                updateSubtitle(currentDays);
                renderChart(transformSessions(d.sessions ?? []));

            } catch (e) {
                console.error('Dashboard load failed', e);
                showSnackbar('Failed to load dashboard', 'error');
                renderChart([]);
            }
        }

        loadDashboard();
    </script>
</body>

</html>
